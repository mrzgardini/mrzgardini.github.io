<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pubblications</title>
<script>
window.MathJax = {
tex: {
inlineMath: [['$', '$'], ['\\(', '\\)']],
displayMath: [['$$', '$$'], ['\\[', '\\]']],
processEscapes: true
},
options: { processHtmlClass: 'mathjax-render' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
@font-face {
font-family: noto-sans-regular;
src: url('https://mrzgardini.github.io/noto-sans-regular.ttf');
}
h1, h2, h3, a, p {
font-family: noto-sans-regular;
}
body {
margin: 0 auto;
max-width: 36em;
padding: 0 1em;
box-sizing: border-box;
}
pre, code {
white-space: pre-wrap;
word-wrap: break-word;
overflow-x: auto;
}
.mathjax-render {
overflow-x: auto;
overflow-y: hidden;
}
img, embed, iframe {
max-width: 100%;
}
</style>
</head>
<body>
<div id="content" class="mathjax-render"></div>
<script id="markdown-source" type="text/markdown">



# Pubblications

Maurizio Gardini, [Sagemath as a calculator](202412300621.pdf), 2024.

Maurizio Gardini, [Average of matrices](300920252002.pdf), 2025.



</script>
<script>
const renderer = new marked.Renderer();
renderer.link = ({ href, title, text }) => {
const titleAttr = title ? ` title="${title}"` : '';
return `<a href="${href}" target="_blank" rel="noopener noreferrer"${titleAttr}>${text}</a>`;
};
renderer.heading = ({ text, depth }) => {
const idMatch = text.match(/\{#(.+?)\}/);
const id = idMatch ? idMatch[1] : text.toLowerCase().trim().replace(/[^\w]+/g, '-');
const cleanText = text.replace(/\{#.+?\}/, '').trim();
return `<h${depth} id="${id}">${cleanText}</h${depth}>`;
};
marked.use({ renderer });
function render() {
const container = document.getElementById('content');
const rawMarkdown = document.getElementById('markdown-source').innerHTML;
const mathBlocks = [];
let tempText = rawMarkdown.replace(/(\$\$[\s\S]+?\$\$|\$[^\$]+?\$)/g, (match) => {
mathBlocks.push(match);
return `%%MATH_${mathBlocks.length - 1}%%`;
});
let html = marked.parse(tempText);
html = html.replace(/%%MATH_(\d+)%%/g, (match, index) => {
return mathBlocks[index].replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
});
container.innerHTML = html;
if (window.MathJax && MathJax.typesetPromise) {
MathJax.typesetPromise([container]).then(() => {
container.classList.add('ready');
if (window.location.hash) {
const target = document.querySelector(window.location.hash);
if (target) target.scrollIntoView();
}
});
}
}
window.onload = render;
</script>
</body>
</html>
