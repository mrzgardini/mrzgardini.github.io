The relations $a \le b$ e $b \le a$ imply $a = b$ [1].
```
example (a b : ℝ) (hab : a ≤ b) (hba : b ≤ a) : a = b := by
```
Get $a, b \in \mathbb{R}$ we prove that if $a \le b$ and $b \le a$ then $a = b$.
```
le_antisymm : {α : Type} [PartialOrder α] {a b : α} : a ≤ b → b ≤ a → a = b
```
We use le_antisymm, which is a theorem already proved in Mathlib. The lean code here [2].

Get $a, b, c \in \mathbb{R}$ we prove that if $a \le b$ and $b \le c$ then $a \le c$.

le_trans : a ≤ b → b ≤ c → a ≤ c

# 30 january 2026, 22:00 {#300120262200}

For any pair $a, b$ of real numbers we have $a \le b$ or $b \le a$ [1].
```
theorem dichotomy (x : ℝ) : x > 0 ∨ x = 0 ∨ x < 0 := by
```
Get an $x \in \mathbb{R}$ and prove $x > 0 \vee x = 0 \vee x < 0$.
```
by_cases hx_pos : x > 0
```
We divide into two cases, if $x > 0$ is true or if $x > 0$ is false.
```
· exact Or.inl hx_pos
```
If $x > 0$ is true then $x > 0 \vee x = 0 \vee x < 0$.
```
· by_cases hx_neg : x < 0
```
If $x > 0$ is false, we have a case in which $x < 0$ is true and a case in which $x < 0$ is false.
```
· exact Or.inr (Or.inr hx_neg)
```
$x > 0$ is true then $x = 0 \vee x < 0$ but $x < 0$.
```
· have hx_zero : x = 0 := by
linarith
```
If $x > 0$ is false and $x < 0$ is false, that is, $x \le 0$ and $x \geq 0$ we have $x = 0$.
```
exact Or.inr (Or.inl hx_zero)
```
To prove $x > 0 \vee x = 0 \vee x < 0$ we have $x = 0$, we choose $x = 0 \vee x < 0$ and then $x = 0$. The lean code here [2].

<script>
const renderer = new marked.Renderer();
renderer.link = ({ href, title, text }) => {
const titleAttr = title ? ` title="${title}"` : '';
return `<a href="${href}" target="_blank" rel="noopener noreferrer"${titleAttr}>${text}</a>`;
};
renderer.heading = ({ text, depth }) => {
const idMatch = text.match(/\{#(.+?)\}/);
const id = idMatch ? idMatch[1] : text.toLowerCase().trim().replace(/[^\w]+/g, '-');
const cleanText = text.replace(/\{#.+?\}/, '').trim();
return `<h${depth} id="${id}">${cleanText}</h${depth}>`;
};
marked.use({ renderer });
function render() {
const container = document.getElementById('content');
const rawMarkdown = document.getElementById('markdown-source').innerHTML;
const mathBlocks = [];
let tempText = rawMarkdown.replace(/(\$\$[\s\S]+?\$\$|\$[^\$]+?\$)/g, (match) => {
mathBlocks.push(match);
return `%%MATH_${mathBlocks.length - 1}%%`;
});
let html = marked.parse(tempText);
html = html.replace(/%%MATH_(\d+)%%/g, (match, index) => {
return mathBlocks[index].replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
});
container.innerHTML = html;
if (window.MathJax && MathJax.typesetPromise) {
MathJax.typesetPromise([container]).then(() => {
container.classList.add('ready');
if (window.location.hash) {
const target = document.querySelector(window.location.hash);
if (target) target.scrollIntoView();
}
});
}
}
window.onload = render;
</script>
